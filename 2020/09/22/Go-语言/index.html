ass="line">)</span><br><span class="line"></span><br><span class="line"><span class="comment">//程序的入口函数</span></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">    name=<span class="string">&quot;luozijian&quot;</span></span><br><span class="line">    age=<span class="number">22</span></span><br><span class="line">    isok=<span class="literal">true</span></span><br><span class="line">    </span><br><span class="line">	fmt.Print(isok)                    <span class="comment">//在终端中输出要打印的内容</span></span><br><span class="line">    fmt.Printf(<span class="string">&quot;name:%s&quot;</span>,name)         <span class="comment">//%s:占位符，使用name这个变量的值去替代占位符</span></span><br><span class="line">    fmt.Println(age)                   <span class="comment">//打印完指定的内容之后会在后面一个换行符</span></span><br><span class="line">    </span><br><span class="line">    </span><br><span class="line">    <span class="comment">//申明变量同时赋值</span></span><br><span class="line">    <span class="keyword">var</span> s1 <span class="keyword">string</span> <span class="string">&quot;heihei&quot;</span></span><br><span class="line">    fmt.Prtinln(s1)</span><br><span class="line">    <span class="comment">// 类型推导（根据值判断该变量是什么类型</span></span><br><span class="line">    </span><br><span class="line">    <span class="keyword">var</span> s2=<span class="string">&quot;20&quot;</span></span><br><span class="line">    fmt.Println(s2)</span><br><span class="line">    <span class="comment">//简短变量申明(只能在函数中使用)</span></span><br><span class="line">    s3 :=<span class="string">&#x27;hei&#x27;</span></span><br><span class="line">    fmt.Println(s3)</span><br><span class="line">	</span><br><span class="line">    <span class="comment">//同一个作用域中不能重复申明同名的变量</span></span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="comment">//常量</span></span><br><span class="line"><span class="comment">//定义了常量之后不能改变</span></span><br><span class="line"><span class="comment">//在程序运行期间不会改变的值</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">const</span> pi=<span class="number">3.1415926</span></span><br><span class="line"><span class="comment">//批量申明常量</span></span><br><span class="line"><span class="keyword">const</span>(</span><br><span class="line">	statusok=<span class="number">200</span></span><br><span class="line">    notfound=<span class="number">404</span></span><br><span class="line">)</span><br><span class="line"><span class="comment">//批量申明常量时，如果某一行申明后没有赋值，默认就和上一行一致</span></span><br><span class="line"><span class="keyword">const</span>(</span><br><span class="line">	n1=<span class="number"
